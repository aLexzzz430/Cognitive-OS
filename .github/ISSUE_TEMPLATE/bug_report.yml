name: Bug report
description: Report a concrete defect in the repository
labels:
  - bug
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and relevant package versions.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: logs_screenshots
    attributes:
      label: Logs / screenshots
      description: Add stack traces, terminal output, or screenshots if available.
    validations:
      required: false
